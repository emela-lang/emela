name: Release

# Pushing a `v*` tag on `main` publishes a stable release. The version comes from
# the tag and must match the crate version in Cargo.toml, so the tag is the only
# manual step — build, test, packaging, notes, and publishing are automatic.
#
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Derive and verify version
        id: v
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          crate=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="emela").version')
          if [ "$version" != "$crate" ]; then
            echo "::error::tag $tag (version $version) does not match Cargo.toml version $crate" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  release:
    needs: version
    uses: ./.github/workflows/build-release.yml
    with:
      version: ${{ needs.version.outputs.version }}
      tag: ${{ github.ref_name }}
      prerelease: false
      latest: true
