name: Release-plz

# release-plz drives stable releases (see docs/release.md). On every push to
# `main` it runs two independent jobs:
#
#   - release-plz-pr:      opens or updates the "release" PR that bumps the
#                          workspace version and appends to CHANGELOG.md.
#   - release-plz-release: once that PR is merged, pushes the `vX.Y.Z` tag,
#                          which triggers `release.yml` to build and publish the
#                          tarball GitHub Release.
#
# Both jobs authenticate with RELEASE_PLZ_TOKEN (a GitHub App token or PAT with
# `contents: write` + `pull-requests: write`), NOT the default GITHUB_TOKEN. A
# tag or PR created with GITHUB_TOKEN cannot trigger further workflows, so
# `release.yml` and the release PR's CI checks would silently never run. See the
# setup section of docs/release.md for registering the secret.
#
# crates.io publishing is disabled (release-plz.toml `publish = false`), so no
# CARGO_REGISTRY_TOKEN is needed.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    # Serialize PR runs so overlapping pushes don't race on the release branch,
    # but never cancel one in flight (that could skip a release).
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
